        scope_object_id:
          type: string
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
        reason:
          type: string
    ReconciliationJob:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        connection_id:
          type: string
        provider:
          type: string
        state:
          type: string
          enum: [scheduled, running, completed, canceled, failed]
        dry_run:
          type: boolean
        capture_missing:
          type: boolean
        route_recovered:
          type: boolean
        redeliver_failed:
          type: boolean
        scope_object_id:
          type: string
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
        cursor:
          type: string
        reason:
          type: string
        total_items:
          type: integer
        matched_items:
          type: integer
        missing_items:
          type: integer
        captured_items:
          type: integer
        redelivered_items:
          type: integer
        unrecoverable_items:
          type: integer
        failed_items:
          type: integer
        error:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        canceled_at:
          type: string
          format: date-time
    ReconciliationJobPage:
      type: object
