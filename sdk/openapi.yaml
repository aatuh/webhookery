    ProviderConnection:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        provider:
          type: string
          enum: [stripe, github, shopify, slack]
        state:
          type: string
          enum: [active, revoked]
        credential_type:
          type: string
        credential_hint:
          type: string
        config:
          type: object
          additionalProperties:
            type: string
        verified_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProviderConnectionPage:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProviderConnection"
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    ReconciliationJobRequest:
      type: object
      required: [connection_id]
