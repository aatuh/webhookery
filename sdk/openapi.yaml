            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRetentionPolicyRequest"
      responses:
        "200":
          description: Retention policy updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
  /v1/endpoint-health:
    get:
      summary: List endpoint health
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated endpoint health summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointHealthPage"
  /v1/ops/metrics:
    get:
      summary: Get tenant ops metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant-scoped operational metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsMetrics"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  responses:
    Problem:
      description: Problem details error response.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    Problem:
      type: object
      required: [type, title, status, code, request_id]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
        request_id:
          type: string
        retryable:
          type: boolean
    DeliverySignature:
      type: string
      description: Webhook-Signature header using HMAC-SHA256.
    ReasonRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
    CreateAPIKeyRequest:
      type: object
      required: [name, role, scopes]
      additionalProperties: false
      properties:
        name:
          type: string
        user_id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [owner, admin, developer, operator, security, auditor, support]
        scopes:
          type: array
          minItems: 1
          items:
            type: string
    APIKeyCreated:
      type: object
      required: [key, token]
      properties:
        key:
          $ref: "#/components/schemas/APIKey"
        token:
          type: string
          description: One-time API key token. It is not retrievable later.
    APIKey:
      type: object
      required: [id, tenant_id, user_id, name, prefix, last4, scopes, state, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        user_id:
          type: string
        name:
          type: string
        prefix:
          type: string
        last4:
          type: string
        scopes:
          type: array
          items:
            type: string
        state:
          type: string
          enum: [active, revoked]
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    APIKeyPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/APIKey"
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    RotateSourceSecretRequest:
      type: object
      required: [new_secret, reason]
      additionalProperties: false
      properties:
        new_secret:
          type: string
          minLength: 1
        grace_period_hours:
          type: integer
          minimum: 0
          maximum: 720
          default: 72
        reason:
          type: string
          minLength: 1
    RotateEndpointSecretRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        grace_period_hours:
          type: integer
          minimum: 0
          maximum: 720
          default: 72
        reason:
          type: string
          minLength: 1
    CreateEndpointRequest:
      type: object
      required: [url]
      additionalProperties: false
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        retry_policy_id:
          type: string
        mtls_client_cert_pem:
          type: string
          description: PEM client certificate. Required with mtls_client_key_pem and never returned by the API.
        mtls_client_key_pem:
          type: string
          description: PEM client private key. Required with mtls_client_cert_pem, encrypted at rest, and never returned by the API.
    Endpoint:
      type: object
      required: [id, tenant_id, name, url, state, mtls_enabled, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        state:
          type: string
        retry_policy_id:
          type: string
        mtls_enabled:
          type: boolean
        mtls_cert_subject:
          type: string
          description: Subject metadata from the configured client certificate. Private key material is never returned.
        created_at:
          type: string
          format: date-time
    SourceSecretVersion:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        source_id:
          type: string
        version:
          type: integer
        state:
          type: string
          enum: [active, previous, revoked]
        active_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    EndpointSecretVersion:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        endpoint_id:
          type: string
        version:
          type: integer
        algorithm:
          type: string
          enum: [hmac_sha256]
        state:
          type: string
          enum: [active, previous, revoked]
        active_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    CreateSubscriptionRequest:
      type: object
      required: [endpoint_id, event_types]
      additionalProperties: false
      properties:
        endpoint_id:
          type: string
        event_types:
          type: array
          items:
            type: string
        payload_format:
          type: string
          default: canonical_json
        transformation_id:
          type: string
          description: Optional active transformation to snapshot onto new delivery payloads.
    CreateRouteRequest:
      type: object
      required: [source_id, name, endpoint_id]
      additionalProperties: false
      properties:
        source_id:
          type: string
        name:
          type: string
        priority:
          type: integer
          default: 100
        event_types:
          type: array
          items:
            type: string
        endpoint_id:
          type: string
        retry_policy_id:
          type: string
        transformation_id:
          type: string
          description: Optional active transformation to snapshot onto new delivery payloads.
    NormalizedEnvelope:
      type: object
      required: [id, tenant_id, event_id, provider, type, source, envelope_sha256, data_sha256, metadata_sha256, storage_status, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        event_id:
          type: string
        adapter_version_id:
          type: string
        provider:
          type: string
        provider_event_id:
          type: string
        type:
          type: string
        source:
          type: string
        subject:
          type: string
        envelope:
          type: object
          additionalProperties: true
          description: Included only when include_data=true and the body has not been retained.
        data:
          type: object
          additionalProperties: true
          description: Included only when include_data=true and the body has not been retained.
        metadata:
          type: object
          additionalProperties: true
        envelope_sha256:
          type: string
        data_sha256:
          type: string
        metadata_sha256:
          type: string
        storage_status:
          type: string
          enum: [stored, deleted, metadata_only]
        storage_deleted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    CreateTransformationRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
        operations:
          type: array
          description: JSON Pointer operations. Supported op values are set, copy, drop, and redact.
          items:
            $ref: "#/components/schemas/TransformationOperation"
    CreateTransformationVersionRequest:
      type: object
      required: [operations]
      additionalProperties: false
      properties:
        operations:
          type: array
          items:
            $ref: "#/components/schemas/TransformationOperation"
    TransformationOperation:
      type: object
      required: [op, path]
      additionalProperties: false
      properties:
        op:
          type: string
          enum: [set, copy, drop, redact]
        path:
          type: string
          description: JSON Pointer path.
        from:
          type: string
          description: JSON Pointer source path for copy.
        value:
          description: Value used by set.
    Transformation:
      type: object
      required: [id, tenant_id, name, state, created_by, created_at, updated_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        state:
          type: string
          enum: [active, disabled]
        active_version_id:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TransformationVersion:
      type: object
      required: [id, tenant_id, transformation_id, version, config_hash, operations, state, created_by, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        transformation_id:
          type: string
        version:
          type: integer
        config_hash:
          type: string
        operations:
          type: array
          items:
            $ref: "#/components/schemas/TransformationOperation"
        state:
          type: string
          enum: [draft, active, inactive]
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
    TransformationPage:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Transformation"
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    TransformationVersionPage:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TransformationVersion"
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    CreateProviderConnectionRequest:
      type: object
      required: [name, provider, credential]
      additionalProperties: false
      properties:
        name:
