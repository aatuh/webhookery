openapi: 3.1.0
info:
  title: Webhookery API
  version: 0.1.0
  description: Self-hosted webhook evidence and delivery control plane.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Liveness check
      responses:
        "200":
          description: Process is alive.
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Dependencies are ready.
        "503":
          description: A dependency is unavailable.
  /openapi.yaml:
    get:
      summary: OpenAPI document
      responses:
        "200":
          description: YAML OpenAPI document.
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Process and queue metrics in Prometheus text format without tenant labels.
          content:
            text/plain:
              schema:
                type: string
  /v1/api-keys:
    get:
      summary: List API keys
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated API key metadata. Key hashes and token values are never returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyPage"
    post:
      summary: Create API key
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created. The token is returned once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreated"
        "403":
          $ref: "#/components/responses/Problem"
  /v1/api-keys/{api_key_id}:revoke:
    post:
      summary: Revoke API key
      security:
        - bearerAuth: []
      parameters:
        - name: api_key_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: API key revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKey"
  /v1/sources:
    get:
      summary: List inbound sources
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated source list.
    post:
      summary: Create inbound source
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Source created.
  /v1/sources/{source_id}/secrets:rotate:
    post:
      summary: Rotate source verification secret
      description: Creates a new active source secret version and keeps the previous version during the requested grace period. Plaintext secrets are never returned.
      security:
        - bearerAuth: []
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateSourceSecretRequest"
      responses:
        "200":
          description: Source secret version metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceSecretVersion"
  /v1/provider-connections:
    get:
      summary: List provider API reconciliation connections
      description: Plaintext provider credentials are never returned.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated provider connection metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnectionPage"
    post:
      summary: Create provider API reconciliation connection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderConnectionRequest"
      responses:
        "201":
          description: Provider connection created with encrypted credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
  /v1/provider-connections/{connection_id}:
    get:
      summary: Get provider API reconciliation connection
      security:
        - bearerAuth: []
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider connection metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
  /v1/provider-connections/{connection_id}:verify:
    post:
      summary: Verify provider API connection credentials
      security:
        - bearerAuth: []
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Provider connection verified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
  /v1/provider-connections/{connection_id}:revoke:
    post:
      summary: Revoke provider API connection credentials
      security:
        - bearerAuth: []
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Provider connection revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
  /v1/endpoints:
    get:
      summary: List outbound endpoints
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated endpoint list.
    post:
      summary: Create outbound endpoint
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEndpointRequest"
      responses:
        "201":
          description: Endpoint created after SSRF validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
  /v1/endpoints:validate-url:
    post:
      summary: Validate endpoint URL against SSRF policy
      security:
        - bearerAuth: []
      responses:
        "200":
          description: URL validation result.
  /v1/endpoints/{endpoint_id}:test:
    post:
      summary: Schedule a signed endpoint test delivery
      security:
        - bearerAuth: []
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "202":
          description: Endpoint test delivery scheduled.
  /v1/endpoints/{endpoint_id}/secrets:rotate:
    post:
      summary: Rotate endpoint signing secret
      description: Creates a new active endpoint signing secret version. Outbound deliveries include signing key metadata headers.
      security:
        - bearerAuth: []
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateEndpointSecretRequest"
      responses:
        "200":
          description: Endpoint signing secret metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointSecretVersion"
  /v1/subscriptions:
    get:
      summary: List subscriptions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated subscription list.
    post:
      summary: Create subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription created.
  /v1/transformations:
    get:
      summary: List deterministic transformations
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated transformation list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationPage"
    post:
      summary: Create deterministic transformation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransformationRequest"
      responses:
        "201":
          description: Transformation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transformation"
  /v1/transformations/{transformation_id}:
    get:
      summary: Get deterministic transformation
      security:
        - bearerAuth: []
      parameters:
        - name: transformation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transformation metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transformation"
  /v1/transformations/{transformation_id}/versions:
    get:
      summary: List immutable transformation versions
      security:
        - bearerAuth: []
      parameters:
        - name: transformation_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Transformation version snapshots.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationVersionPage"
    post:
      summary: Create immutable transformation version
      security:
        - bearerAuth: []
      parameters:
        - name: transformation_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransformationVersionRequest"
      responses:
        "201":
          description: Transformation version created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationVersion"
  /v1/transformations/{transformation_id}/versions/{version_id}:activate:
    post:
      summary: Activate transformation version
      security:
        - bearerAuth: []
      parameters:
        - name: transformation_id
          in: path
          required: true
          schema:
            type: string
        - name: version_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Transformation version activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationVersion"
  /v1/retry-policies:
    get:
      summary: List retry policies
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated retry policy list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryPolicyPage"
    post:
      summary: Create retry policy version
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRetryPolicyRequest"
      responses:
        "201":
          description: Retry policy version created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryPolicy"
  /v1/routes:
    get:
      summary: List routes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated route list.
    post:
      summary: Create route
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRouteRequest"
      responses:
        "201":
          description: Route created.
  /v1/routes/{route_id}/versions:
    get:
      summary: List immutable route versions
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Route version snapshots.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteVersionPage"
  /v1/routes/{route_id}:activate:
    post:
      summary: Activate route
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Route activated.
  /v1/routes/{route_id}:dry-run:
    post:
      summary: Dry-run route against event
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Route match explanation.
  /v1/event-types:
    get:
      summary: List event types
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated event type list.
    post:
      summary: Create event type
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Event type created.
  /v1/event-types/{event_type}/schemas:
    get:
      summary: List schemas for event type
      security:
        - bearerAuth: []
      parameters:
        - name: event_type
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paginated schema list.
    post:
      summary: Create schema for event type
      security:
        - bearerAuth: []
      parameters:
        - name: event_type
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Schema created.
  /v1/event-types/{event_type}/schemas/{schema_version}:validate:
    post:
      summary: Validate payload against schema
      security:
        - bearerAuth: []
      parameters:
        - name: event_type
          in: path
          required: true
          schema:
            type: string
        - name: schema_version
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateSchemaRequest"
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaValidationResult"
  /v1/event-types/{event_type}/schemas/{schema_version}:check-compatibility:
    post:
      summary: Check schema compatibility
      description: Performs conservative JSON-object compatibility checks for required fields and property type changes.
      security:
        - bearerAuth: []
      parameters:
        - name: event_type
          in: path
          required: true
          schema:
            type: string
        - name: schema_version
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckSchemaCompatibilityRequest"
      responses:
        "200":
          description: Compatibility result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaCompatibilityResult"
  /v1/events:
    get:
      summary: Search events
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated event list.
    post:
      summary: Ingest product event
      security:
        - bearerAuth: []
      responses:
        "202":
          description: Product event accepted after durable capture.
  /v1/events/{event_id}:
    get:
      summary: Get event
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event detail.
        "404":
          description: Event not found or not visible.
  /v1/events/{event_id}/raw:
    get:
      summary: Get raw payload evidence
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Raw body as base64 plus hash and storage metadata.
        "403":
          description: Actor lacks raw payload permission.
        "410":
          description: Raw payload body has expired or was deleted by retention; metadata remains on related records.
  /v1/events/{event_id}/normalized:
    get:
      summary: Get normalized event evidence
      description: Metadata and hashes require events:read. Including normalized data requires events:raw and writes an audit event.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
        - name: include_data
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Normalized envelope metadata, hashes, and optionally body data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormalizedEnvelope"
        "403":
          description: Actor lacks events:raw for include_data=true.
        "410":
          description: Normalized data was deleted by retention; metadata and hashes remain.
  /v1/events/{event_id}/timeline:
    get:
      summary: Get event timeline
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Timeline entries for event, receipts, deliveries, attempts, and audit records.
  /v1/ingest/{tenant_id}/{source_id}:
    post:
      summary: Generic provider webhook ingestion
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accepted after durable capture.
        "401":
          description: Invalid signature.
        "413":
          description: Payload too large.
        "431":
          description: Request headers too large.
        "503":
          description: Durable storage unavailable before acknowledgement.
  /v1/ingest/stripe/{source_id}:
    post:
      summary: Stripe webhook ingestion
      responses:
        "200":
          description: Accepted after durable capture.
        "431":
          description: Request headers too large.
  /v1/ingest/github/{source_id}:
    post:
      summary: GitHub webhook ingestion
      responses:
        "200":
          description: Accepted after durable capture.
        "431":
          description: Request headers too large.
  /v1/ingest/shopify/{source_id}:
    post:
      summary: Shopify webhook ingestion
      responses:
        "200":
          description: Accepted after durable capture.
        "431":
          description: Request headers too large.
  /v1/ingest/slack/{source_id}:
    post:
      summary: Slack webhook ingestion
      responses:
        "200":
          description: Accepted after durable capture.
        "431":
          description: Request headers too large.
  /v1/ingest/cloudevents/{source_id}:
    post:
      summary: CloudEvents webhook ingestion
      responses:
        "200":
          description: Accepted after durable capture for binary or structured CloudEvents envelopes.
        "431":
          description: Request headers too large.
  /v1/ingest/generic-jwt/{source_id}:
    post:
      summary: Generic JWT/JWS webhook ingestion
      description: Accepts compact JWT/JWS signatures from `Authorization: Bearer ...` or `Webhook-JWT`; only HS256 is supported and the token must include `exp` plus a `body_sha256` claim for the exact raw body.
      responses:
        "200":
          description: Accepted after durable capture.
        "401":
          description: Invalid or unsupported JWT signature.
        "431":
          description: Request headers too large.
  /v1/deliveries:
    get:
      summary: List deliveries
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated delivery list, including retry seed evidence for reproducible scheduling.
  /v1/deliveries/{delivery_id}/attempts:
    get:
      summary: List delivery attempts
      security:
        - bearerAuth: []
      parameters:
        - name: delivery_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paginated delivery attempts, including deterministic retry delay and next retry timestamp when retryable.
  /v1/deliveries/{delivery_id}:retry:
    post:
      summary: Manually retry delivery
      security:
        - bearerAuth: []
      parameters:
        - name: delivery_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "202":
          description: Delivery retry scheduled.
  /v1/deliveries/{delivery_id}:cancel:
    post:
      summary: Cancel scheduled delivery
      security:
        - bearerAuth: []
      parameters:
        - name: delivery_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Delivery canceled.
  /v1/delivery-attempts/{attempt_id}:
    get:
      summary: Get delivery attempt
      security:
        - bearerAuth: []
      parameters:
        - name: attempt_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delivery attempt detail, including deterministic retry delay evidence when retryable.
  /v1/replay-jobs:dry-run:
    post:
      summary: Dry-run replay
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplayRequest"
      responses:
        "200":
          description: Replay dry-run result.
  /v1/replay-jobs:
    get:
      summary: List replay jobs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated replay job list.
    post:
      summary: Create replay job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplayRequest"
      responses:
        "202":
          description: Replay job scheduled or pending approval when require_approval is true.
  /v1/replay-jobs/{replay_job_id}:approve:
    post:
      summary: Approve pending replay job
      description: Moves a tenant-scoped pending replay job into scheduled state and enqueues durable replay work.
      security:
        - bearerAuth: []
      parameters:
        - name: replay_job_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Replay job approved and scheduled.
  /v1/replay-jobs/{replay_job_id}:pause:
    post:
      summary: Pause replay job
      security:
        - bearerAuth: []
      parameters:
        - name: replay_job_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Replay job paused.
  /v1/replay-jobs/{replay_job_id}:resume:
    post:
      summary: Resume replay job
      security:
        - bearerAuth: []
      parameters:
        - name: replay_job_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Replay job scheduled again.
  /v1/replay-jobs/{replay_job_id}:cancel:
    post:
      summary: Cancel replay job
      security:
        - bearerAuth: []
      parameters:
        - name: replay_job_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Replay job canceled.
  /v1/reconciliation-jobs:dry-run:
    post:
      summary: Dry-run provider reconciliation
      description: Reports expected matched, missing, recoverable, redelivery, or unrecoverable outcomes without capturing recovered events or requesting redelivery.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconciliationJobRequest"
      responses:
        "200":
          description: Dry-run reconciliation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationJob"
  /v1/reconciliation-jobs:
    get:
      summary: List provider reconciliation jobs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated reconciliation jobs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationJobPage"
    post:
      summary: Create provider reconciliation job
      description: Recovered provider API events are not marked as signed webhooks and route only when `route_recovered=true`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconciliationJobRequest"
            examples:
              stripe_recovery:
                value:
                  connection_id: pcn_stripe
                  window_start: "2026-05-25T00:00:00Z"
                  window_end: "2026-05-25T12:00:00Z"
                  capture_missing: true
                  route_recovered: true
                  reason: support case recovery
              github_redelivery:
                value:
                  connection_id: pcn_github
                  redeliver_failed: true
                  reason: request GitHub redelivery for failed deliveries
      responses:
        "201":
          description: Reconciliation job scheduled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationJob"
  /v1/reconciliation-jobs/{job_id}:
    get:
      summary: Get provider reconciliation job
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reconciliation job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationJob"
  /v1/reconciliation-jobs/{job_id}/items:
