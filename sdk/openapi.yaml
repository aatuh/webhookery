  /v1/audit-events:export:
    post:
      summary: Create audit evidence export
      description: Creates a tenant-scoped tar.gz bundle containing manifest.json, audit_events.jsonl, and optional timeline or raw payload JSONL files. Raw payload bodies require events:raw in addition to audit:read.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuditExportRequest"
      responses:
        "202":
          description: Export created and ready for download.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceExport"
        "403":
          description: Actor lacks audit:read or requested raw payload bodies without events:raw.
  /v1/audit-exports:
    get:
      summary: List audit evidence exports
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated tenant-scoped export jobs. Raw-inclusive exports are hidden from actors without events:raw.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceExportPage"
  /v1/audit-exports/{export_id}:
    get:
      summary: Get audit evidence export status
      security:
        - bearerAuth: []
      parameters:
        - name: export_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export job status and hashes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceExport"
        "404":
          description: Export not found or not visible.
  /v1/audit-exports/{export_id}:download:
    get:
      summary: Download audit evidence export bundle
      security:
        - bearerAuth: []
      parameters:
        - name: export_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gzipped tar bundle containing manifest.json and JSONL files.
          headers:
            X-Webhookery-Export-SHA256:
              schema:
                type: string
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        "403":
          description: Actor lacks permission for this export.
        "410":
          description: Export bundle is unavailable.
  /v1/admin/retention-policies:
    get:
      summary: List retention policies
      security:
