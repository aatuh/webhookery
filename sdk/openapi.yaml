      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Reconciliation job canceled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationJob"
  /v1/dead-letter:
