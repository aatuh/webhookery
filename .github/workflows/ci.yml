name: ci

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: hashicorp/setup-terraform@v3

      - name: Install SDK check tools
        run: npm install --global typescript

      - name: Documentation and contract checks
        run: make docs-check

      - name: Fast repository checks
        run: make fast-check

      - name: Coverage gate
        run: make coverage-check

      - name: Non-DB coverage gate
        run: make coverage-non-db-check

      - name: Final quality gate
        run: make finalize
