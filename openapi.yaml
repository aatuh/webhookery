  /v1/events:
    get:
      tags:
        - Events And Ingestion
      operationId: getEvents
      summary: Search events
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: provider
          in: query
          schema:
            type: string
          description: Provider name, such as `stripe`, `github`, or `shopify`.
        - name: external_id
          in: query
          schema:
            type: string
          description: Provider event ID, such as a Stripe event ID.
        - name: delivery_id
          in: query
          schema:
            type: string
          description: Webhookery delivery ID linked to the event.
        - name: status
          in: query
          schema:
            type: string
            enum: [dlq, dead_lettered]
          description: Forensic status preset. `dlq` and `dead_lettered` return events with open DLQ evidence.
        - name: verification
          in: query
          schema:
            type: string
            enum: [valid, invalid]
          description: Provider signature verification result.
        - name: received_after
          in: query
          schema:
            type: string
            format: date-time
          description: Lower bound for event receipt time.
        - name: route_id
          in: query
          schema:
            type: string
          description: Route ID with delivery evidence linked to the event.
      responses:
        "200":
          description: Paginated event list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPage"
        "400":
          $ref: "#/components/responses/ValidationProblem"
    post:
      tags:
        - Events And Ingestion
      operationId: postEvents
      summary: Ingest product event
      description: Accepts product events from management API keys, producer OAuth bearer tokens, or verified producer mTLS identities. Source-bound credentials must match the submitted `source_id`.
      security:
        - bearerAuth: []
        - producerMTLS: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductEventIngestRequest"
            example:
              source_id: src_internal
              id: evt_demo_001
              type: demo.created
              data:
                ok: true
      responses:
        "202":
          description: Product event accepted after durable capture.
          content:
            application/json:
              example:
                Accepted: true
                EventID: evt_example
                ReceiptID: rcp_example
                RawPayloadID: raw_example
                TraceID: req_example
                VerifyReason: verified
                DedupeStatus: unique
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
