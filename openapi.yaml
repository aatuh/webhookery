openapi: 3.1.0
info:
  title: Webhookery API
  version: 0.1.0
  description: Self-hosted webhook evidence and delivery control plane.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Liveness check
      responses:
        "200":
          description: Process is alive.
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Dependencies are ready.
        "503":
          description: A dependency is unavailable.
  /openapi.yaml:
    get:
      summary: OpenAPI document
      responses:
        "200":
          description: YAML OpenAPI document.
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Process and queue metrics in Prometheus text format without tenant labels.
          content:
            text/plain:
              schema:
                type: string
  /v1/api-keys:
    get:
      summary: List API keys
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated API key metadata. Key hashes and token values are never returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyPage"
    post:
      summary: Create API key
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created. The token is returned once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreated"
        "403":
          $ref: "#/components/responses/Problem"
  /v1/api-keys/{api_key_id}:revoke:
    post:
      summary: Revoke API key
      security:
        - bearerAuth: []
      parameters:
        - name: api_key_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: API key revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKey"
  /v1/sources:
    get:
      summary: List inbound sources
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated source list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcePage"
    post:
      summary: Create inbound source
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceRequest"
      responses:
        "201":
          description: Source created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
  /v1/sources/{source_id}:
    get:
      summary: Get inbound source
      security:
        - bearerAuth: []
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Source metadata without plaintext secrets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "404":
          description: Source not found in this tenant.
    patch:
      summary: Update inbound source metadata or state
      description: Updates mutable source metadata. Verification secrets are rotated through the dedicated rotate endpoint and are never returned.
      security:
        - bearerAuth: []
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSourceRequest"
      responses:
        "200":
          description: Updated source metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
    delete:
      summary: Disable inbound source
      description: Disables the source without deleting historical evidence.
      security:
        - bearerAuth: []
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Disabled source metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
  /v1/sources/{source_id}/secrets:rotate:
    post:
      summary: Rotate source verification secret
      description: Creates a new active source secret version and keeps the previous version during the requested grace period. Plaintext secrets are never returned.
      security:
        - bearerAuth: []
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateSourceSecretRequest"
      responses:
        "200":
          description: Source secret version metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceSecretVersion"
  /v1/provider-connections:
    get:
      summary: List provider API reconciliation connections
      description: Plaintext provider credentials are never returned.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated provider connection metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnectionPage"
    post:
      summary: Create provider API reconciliation connection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderConnectionRequest"
      responses:
        "201":
          description: Provider connection created with encrypted credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
  /v1/provider-connections/{connection_id}:
    get:
      summary: Get provider API reconciliation connection
      security:
        - bearerAuth: []
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider connection metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
  /v1/provider-connections/{connection_id}:verify:
    post:
      summary: Verify provider API connection credentials
      security:
        - bearerAuth: []
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Provider connection verified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
  /v1/provider-connections/{connection_id}:revoke:
    post:
      summary: Revoke provider API connection credentials
      security:
        - bearerAuth: []
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Provider connection revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
  /v1/endpoints:
    get:
      summary: List outbound endpoints
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated endpoint list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointPage"
    post:
      summary: Create outbound endpoint
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEndpointRequest"
      responses:
        "201":
          description: Endpoint created after SSRF validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
  /v1/endpoints/{endpoint_id}:
    get:
      summary: Get outbound endpoint
      security:
        - bearerAuth: []
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Endpoint metadata without secret or mTLS key material.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
        "404":
          description: Endpoint not found in this tenant.
    patch:
      summary: Update outbound endpoint metadata, URL, retry policy, or state
      description: URL updates rerun the SSRF policy before persistence. Signing secrets and mTLS key material are managed through dedicated endpoints.
      security:
        - bearerAuth: []
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEndpointRequest"
      responses:
        "200":
          description: Updated endpoint metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
        "422":
          description: Endpoint URL blocked by SSRF policy.
    delete:
      summary: Disable outbound endpoint
      description: Disables future delivery claims without deleting historical deliveries, attempts, or evidence.
      security:
        - bearerAuth: []
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Disabled endpoint metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
  /v1/endpoints:validate-url:
    post:
      summary: Validate endpoint URL against SSRF policy
      security:
        - bearerAuth: []
      responses:
        "200":
          description: URL validation result.
  /v1/endpoints/{endpoint_id}:test:
    post:
      summary: Schedule a signed endpoint test delivery
      security:
        - bearerAuth: []
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "202":
          description: Endpoint test delivery scheduled.
  /v1/endpoints/{endpoint_id}/secrets:rotate:
    post:
      summary: Rotate endpoint signing secret
      description: Creates a new active endpoint signing secret version. Outbound deliveries include signing key metadata headers.
      security:
        - bearerAuth: []
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateEndpointSecretRequest"
      responses:
        "200":
          description: Endpoint signing secret metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointSecretVersion"
  /v1/subscriptions:
    get:
      summary: List subscriptions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated subscription list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPage"
    post:
      summary: Create subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
  /v1/subscriptions/{subscription_id}:
    get:
      summary: Get subscription
      security:
        - bearerAuth: []
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscription metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "404":
          description: Subscription not found in this tenant.
    patch:
      summary: Update subscription
      description: Updates fanout configuration and records a new immutable subscription version.
      security:
        - bearerAuth: []
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionRequest"
      responses:
        "200":
          description: Updated subscription metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
    delete:
      summary: Disable subscription
      description: Disables future fanout without deleting historical deliveries or configuration evidence.
      security:
        - bearerAuth: []
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Disabled subscription metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
  /v1/transformations:
    get:
      summary: List deterministic transformations
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated transformation list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationPage"
    post:
      summary: Create deterministic transformation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransformationRequest"
      responses:
        "201":
          description: Transformation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transformation"
  /v1/transformations/{transformation_id}:
    get:
      summary: Get deterministic transformation
      security:
        - bearerAuth: []
      parameters:
        - name: transformation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transformation metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transformation"
  /v1/transformations/{transformation_id}/versions:
    get:
      summary: List immutable transformation versions
      security:
        - bearerAuth: []
      parameters:
        - name: transformation_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Transformation version snapshots.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationVersionPage"
    post:
      summary: Create immutable transformation version
      security:
        - bearerAuth: []
      parameters:
        - name: transformation_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransformationVersionRequest"
      responses:
        "201":
          description: Transformation version created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationVersion"
  /v1/transformations/{transformation_id}/versions/{version_id}:activate:
    post:
      summary: Activate transformation version
      security:
        - bearerAuth: []
      parameters:
        - name: transformation_id
          in: path
          required: true
          schema:
            type: string
        - name: version_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Transformation version activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationVersion"
  /v1/retry-policies:
    get:
      summary: List retry policies
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated retry policy list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryPolicyPage"
    post:
      summary: Create retry policy version
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRetryPolicyRequest"
      responses:
        "201":
          description: Retry policy version created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryPolicy"
  /v1/retry-policies/{retry_policy_id}:
    get:
      summary: Get retry policy
      security:
        - bearerAuth: []
      parameters:
        - name: retry_policy_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Retry policy metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryPolicy"
        "404":
          description: Retry policy not found in this tenant.
    patch:
      summary: Create a new retry policy version from an existing policy
      description: Leaves the existing policy row intact and returns the new version row.
      security:
        - bearerAuth: []
      parameters:
        - name: retry_policy_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRetryPolicyRequest"
      responses:
        "200":
          description: New retry policy version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryPolicy"
    delete:
      summary: Disable retry policy
      description: Disables future use of the referenced retry policy row without deleting historical delivery evidence.
      security:
        - bearerAuth: []
      parameters:
        - name: retry_policy_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Disabled retry policy metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryPolicy"
  /v1/routes:
    get:
      summary: List routes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated route list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutePage"
    post:
      summary: Create route
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRouteRequest"
      responses:
        "201":
          description: Route created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
  /v1/routes/{route_id}:
    get:
      summary: Get route
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Route metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
        "404":
          description: Route not found in this tenant.
    patch:
      summary: Update route
      description: Updates route matching/destination metadata and records a new immutable route version.
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRouteRequest"
      responses:
        "200":
          description: Updated route metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
    delete:
      summary: Inactivate route
      description: Moves the route to inactive without deleting historical decisions, deliveries, or version evidence.
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Inactivated route metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
  /v1/routes/{route_id}/versions:
    get:
      summary: List immutable route versions
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Route version snapshots.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteVersionPage"
  /v1/routes/{route_id}:activate:
    post:
      summary: Activate route
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Route activated.
  /v1/routes/{route_id}:dry-run:
    post:
      summary: Dry-run route against event
      security:
        - bearerAuth: []
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Route match explanation.
  /v1/event-types:
    get:
      summary: List event types
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated event type list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventTypePage"
    post:
      summary: Create event type
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventTypeRequest"
      responses:
        "201":
          description: Event type created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventType"
  /v1/event-types/{event_type}:
    get:
      summary: Get event type
      security:
        - bearerAuth: []
      parameters:
        - name: event_type
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event type metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventType"
        "404":
          description: Event type not found in this tenant.
    patch:
      summary: Update event type metadata or state
      description: Event type names remain immutable; delete disables the event type.
      security:
        - bearerAuth: []
      parameters:
        - name: event_type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventTypeRequest"
      responses:
        "200":
          description: Event type updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventType"
    delete:
      summary: Disable event type
      description: Event type delete is a state transition to disabled; historical schemas and evidence remain.
      security:
        - bearerAuth: []
      parameters:
        - name: event_type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StateChangeRequest"
      responses:
        "200":
          description: Event type disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventType"
  /v1/event-types/{event_type}/schemas:
    get:
      summary: List schemas for event type
      security:
        - bearerAuth: []
      parameters:
        - name: event_type
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paginated schema list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSchemaPage"
    post:
      summary: Create schema for event type
      security:
        - bearerAuth: []
      parameters:
        - name: event_type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventSchemaRequest"
      responses:
        "201":
          description: Schema created.
          content:
            application/json:
              schema:
