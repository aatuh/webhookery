openapi: 3.1.0
info:
  title: Webhookery API
  version: 0.1.0
  description: Self-hosted webhook evidence and delivery control plane.
servers:
  - url: http://localhost:8080
tags:
  - name: System
    description: Health, readiness, metrics, and the OpenAPI document.
  - name: API Keys
    description: Management API key lifecycle.
  - name: Producer Trust
    description: Product-event producer credentials, OAuth, and mTLS identities.
  - name: Auth And Identity
    description: OIDC sessions, SCIM, role bindings, access policies, and authorization explanation.
  - name: Sources And Providers
    description: Webhook sources, provider connections, adapters, and provider ingress.
  - name: Endpoints And Routing
    description: Outbound endpoints, subscriptions, routes, and retry policies.
  - name: Schemas And Transformations
    description: Event schemas, compatibility checks, and deterministic transformations.
  - name: Events And Ingestion
    description: Product events, provider ingestion, event evidence, raw payloads, and timelines.
  - name: Incidents
    description: Webhook incident packets, report snapshots, and incident evidence exports.
  - name: Delivery And Replay
    description: Deliveries, attempts, replay jobs, dead letter, and quarantine.
  - name: Reconciliation
    description: Provider reconciliation jobs and gap evidence.
  - name: Audit And Retention
    description: Audit events, audit chain, evidence exports, and retention policies.
  - name: Operations
    description: Operational metrics, storage/config views, workers, queues, and alerts.
  - name: Signal Egress
    description: Notification channels, notification deliveries, SIEM sinks, and SIEM deliveries.
paths:
  /healthz:
    get:
      tags:
        - System
      operationId: getHealthz
      summary: Liveness check
      responses:
        "200":
          description: Process is alive.
  /readyz:
    get:
      tags:
        - System
      operationId: getReadyz
      summary: Readiness check
      responses:
        "200":
          description: Dependencies are ready.
        "503":
          description: A dependency is unavailable.
  /openapi.yaml:
    get:
      tags:
        - System
      operationId: getOpenapiYaml
      summary: OpenAPI document
      responses:
        "200":
          description: YAML OpenAPI document.
  /metrics:
    get:
      tags:
        - System
      operationId: getMetrics
      summary: Prometheus metrics
      responses:
        "200":
          description: Process and queue metrics in Prometheus text format without tenant labels.
          content:
            text/plain:
              schema:
                type: string
  /v1/api-keys:
    get:
      tags:
        - API Keys
      operationId: getApiKeys
      summary: List API keys
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated API key metadata. Key hashes and token values are never returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyPage"
    post:
      tags:
        - API Keys
      operationId: postApiKeys
      summary: Create API key
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created. The token is returned once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreated"
        "403":
          $ref: "#/components/responses/Problem"
  /v1/api-keys/{api_key_id}:revoke:
    post:
      tags:
        - API Keys
      operationId: postApiKeysApiKeyIdRevoke
      summary: Revoke API key
      security:
        - bearerAuth: []
      parameters:
        - name: api_key_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: API key revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKey"
  /v1/oauth/token:
    post:
      tags:
        - Producer Trust
      operationId: postOauthToken
      summary: Issue producer OAuth access token
      description: Issues an opaque short-lived bearer token for product-event producers using the client credentials grant. Only HTTP Basic client authentication is accepted; client secrets in the form body are rejected.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/OAuthClientCredentialsRequest"
            example:
              grant_type: client_credentials
              scope: events:write
      responses:
        "200":
          description: Non-cacheable producer access token response.
          headers:
            Cache-Control:
              schema:
                type: string
              description: Always `no-store`.
            Pragma:
              schema:
                type: string
              description: Always `no-cache`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerTokenResponse"
              example:
                access_token: "<opaque-access-token>"
                token_type: Bearer
                expires_in: 900
                scope: events:write
        "400":
          $ref: "#/components/responses/Problem"
        "401":
          $ref: "#/components/responses/Problem"
  /v1/producer-clients:
    get:
      tags:
        - Producer Trust
      operationId: getProducerClients
      summary: List producer OAuth clients
      description: Lists tenant-scoped producer client metadata. Client secret hashes and token values are never returned.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated producer client metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerClientPage"
    post:
      tags:
        - Producer Trust
      operationId: postProducerClients
      summary: Create producer OAuth client
      description: Creates a tenant/source-bound product-event producer credential. The generated client secret is returned once only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProducerClientRequest"
      responses:
        "201":
          description: Producer client created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerClientCreated"
        "403":
          $ref: "#/components/responses/Problem"
  /v1/producer-clients/{client_id}:
    get:
      tags:
        - Producer Trust
      operationId: getProducerClientsClientId
      summary: Get producer OAuth client
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Producer client metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerClient"
    patch:
      tags:
        - Producer Trust
      operationId: patchProducerClientsClientId
      summary: Update producer OAuth client
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProducerClientRequest"
      responses:
        "200":
          description: Producer client updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerClient"
    delete:
      tags:
        - Producer Trust
      operationId: deleteProducerClientsClientId
      summary: Disable producer OAuth client
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Producer client disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerClient"
  /v1/producer-clients/{client_id}/secrets:rotate:
    post:
      tags:
        - Producer Trust
      operationId: postProducerClientsClientIdSecretsRotate
      summary: Rotate producer client secret
      description: Revokes active producer client secrets and returns the new client secret once only.
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Producer client secret rotated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerClientSecretRotated"
  /v1/producer-mtls-identities:
    get:
      tags:
        - Producer Trust
      operationId: getProducerMtlsIdentities
      summary: List producer mTLS identities
      description: Lists tenant-scoped producer client-certificate identities. Private keys and raw certificate private material are never stored or returned.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated producer mTLS identities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerMTLSIdentityPage"
    post:
      tags:
        - Producer Trust
      operationId: postProducerMtlsIdentities
      summary: Create producer mTLS identity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProducerMTLSIdentityRequest"
      responses:
        "201":
          description: Producer mTLS identity created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerMTLSIdentity"
  /v1/producer-mtls-identities/{identity_id}:
    get:
      tags:
        - Producer Trust
      operationId: getProducerMtlsIdentitiesIdentityId
      summary: Get producer mTLS identity
      security:
        - bearerAuth: []
      parameters:
        - name: identity_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Producer mTLS identity metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerMTLSIdentity"
    patch:
      tags:
        - Producer Trust
      operationId: patchProducerMtlsIdentitiesIdentityId
      summary: Update producer mTLS identity
      security:
        - bearerAuth: []
      parameters:
        - name: identity_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProducerMTLSIdentityRequest"
      responses:
        "200":
          description: Producer mTLS identity updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerMTLSIdentity"
    delete:
      tags:
        - Producer Trust
      operationId: deleteProducerMtlsIdentitiesIdentityId
      summary: Disable producer mTLS identity
      security:
        - bearerAuth: []
      parameters:
        - name: identity_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Producer mTLS identity disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerMTLSIdentity"
  /v1/producer-mtls-identities/{identity_id}:verify:
    post:
      tags:
        - Producer Trust
      operationId: postProducerMtlsIdentitiesIdentityIdVerify
      summary: Verify producer mTLS certificate against identity
      security:
        - bearerAuth: []
      parameters:
        - name: identity_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyProducerMTLSIdentityRequest"
      responses:
        "200":
          description: Certificate verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerMTLSIdentityVerification"
  /v1/auth/oidc/login:
    get:
      tags:
        - Auth And Identity
      operationId: getAuthOidcLogin
      summary: Start OIDC management login
      description: Starts Authorization Code + PKCE login for a tenant identity provider and redirects to the provider authorization endpoint.
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: provider_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_after
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to identity provider.
  /v1/auth/oidc/callback:
    get:
      tags:
        - Auth And Identity
      operationId: getAuthOidcCallback
      summary: Complete OIDC management login
      description: Validates state, nonce, issuer, audience, expiry, and signed ID token before creating a hashed management session cookie.
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionCreated"
  /v1/auth/logout:
    post:
      tags:
        - Auth And Identity
      operationId: postAuthLogout
      summary: Revoke current management session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked.
  /v1/auth/session:
    get:
      tags:
        - Auth And Identity
      operationId: getAuthSession
      summary: Get current management session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current session metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
              example:
                id: ses_example
                tenant_id: ten_example
                user_id: usr_example
                external_identity_id: oidc_example
                state: active
                created_at: "2026-05-26T12:00:00Z"
                last_seen_at: "2026-05-26T12:05:00Z"
                expires_at: "2026-05-26T20:00:00Z"
  /v1/auth/sessions:
    get:
      tags:
        - Auth And Identity
      operationId: getAuthSessions
      summary: List active management sessions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated tenant-scoped session metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionPage"
  /v1/auth/sessions/{session_id}:revoke:
    post:
      tags:
        - Auth And Identity
      operationId: postAuthSessionsSessionIdRevoke
      summary: Revoke management session
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
  /v1/identity-providers:
    get:
      tags:
        - Auth And Identity
      operationId: getIdentityProviders
      summary: List identity providers
      description: Lists tenant-scoped OIDC identity provider metadata. Client secrets are never returned.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated identity providers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityProviderPage"
    post:
      tags:
        - Auth And Identity
      operationId: postIdentityProviders
      summary: Create OIDC identity provider
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIdentityProviderRequest"
      responses:
        "201":
          description: Identity provider created with encrypted client secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityProvider"
  /v1/identity-providers/{provider_id}:
    get:
      tags:
        - Auth And Identity
      operationId: getIdentityProvidersProviderId
      summary: Get identity provider
      security:
        - bearerAuth: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Identity provider metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityProvider"
    patch:
      tags:
        - Auth And Identity
      operationId: patchIdentityProvidersProviderId
      summary: Update identity provider
      security:
        - bearerAuth: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIdentityProviderRequest"
      responses:
        "200":
          description: Identity provider updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityProvider"
    delete:
      tags:
        - Auth And Identity
      operationId: deleteIdentityProvidersProviderId
      summary: Disable identity provider
      security:
        - bearerAuth: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Identity provider disabled and active sessions invalidated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityProvider"
  /v1/identity-providers/{provider_id}:test:
    post:
      tags:
        - Auth And Identity
      operationId: postIdentityProvidersProviderIdTest
      summary: Test identity provider configuration
      security:
        - bearerAuth: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Identity provider test was recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityProvider"
  /v1/scim-tokens:
    get:
      tags:
        - Auth And Identity
      operationId: getScimTokens
      summary: List SCIM tokens
      description: Lists SCIM token metadata only. Raw tokens and hashes are never returned.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated SCIM token metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SCIMTokenPage"
    post:
      tags:
        - Auth And Identity
      operationId: postScimTokens
      summary: Create SCIM token
      description: Returns the SCIM bearer token exactly once.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSCIMTokenRequest"
      responses:
        "201":
          description: SCIM token created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SCIMTokenCreated"
  /v1/scim-tokens/{token_id}:
    delete:
      tags:
        - Auth And Identity
      operationId: deleteScimTokensTokenId
      summary: Revoke SCIM token
      security:
        - bearerAuth: []
      parameters:
        - name: token_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: SCIM token revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SCIMToken"
  /v1/scim/v2/Users:
    get:
      tags:
        - Auth And Identity
      operationId: getScimV2Users
      summary: List SCIM users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SCIM ListResponse.
    post:
      tags:
        - Auth And Identity
      operationId: postScimV2Users
      summary: Provision SCIM user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SCIMUserRequest"
      responses:
        "201":
          description: User provisioned.
  /v1/scim/v2/Users/{user_id}:
    get:
      tags:
        - Auth And Identity
      operationId: getScimV2UsersUserId
      summary: Get SCIM user
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SCIM user.
    put:
      tags:
        - Auth And Identity
      operationId: putScimV2UsersUserId
      summary: Replace SCIM user
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SCIMUserRequest"
      responses:
        "200":
          description: User replaced.
    patch:
      tags:
        - Auth And Identity
      operationId: patchScimV2UsersUserId
      summary: Patch SCIM user
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SCIMPatchRequest"
      responses:
        "200":
          description: User patched.
    delete:
      tags:
        - Auth And Identity
      operationId: deleteScimV2UsersUserId
      summary: Deactivate SCIM user
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deactivated.
  /v1/scim/v2/Groups:
    get:
      tags:
        - Auth And Identity
      operationId: getScimV2Groups
      summary: List SCIM groups
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SCIM ListResponse.
    post:
      tags:
        - Auth And Identity
      operationId: postScimV2Groups
      summary: Provision SCIM group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SCIMGroupRequest"
      responses:
        "201":
          description: Group provisioned.
  /v1/scim/v2/Groups/{group_id}:
    get:
      tags:
        - Auth And Identity
      operationId: getScimV2GroupsGroupId
      summary: Get SCIM group
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SCIM group.
    put:
      tags:
        - Auth And Identity
      operationId: putScimV2GroupsGroupId
      summary: Replace SCIM group
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SCIMGroupRequest"
      responses:
        "200":
          description: Group replaced.
    patch:
      tags:
        - Auth And Identity
      operationId: patchScimV2GroupsGroupId
      summary: Patch SCIM group
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SCIMPatchRequest"
      responses:
        "200":
          description: Group patched.
    delete:
      tags:
        - Auth And Identity
      operationId: deleteScimV2GroupsGroupId
      summary: Deactivate SCIM group
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group deactivated.
  /v1/role-bindings:
    get:
      tags:
