components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    basicAuth:
      type: http
      scheme: basic
    producerMTLS:
      type: mutualTLS
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  responses:
    Problem:
      description: Problem details error response.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: about:blank
            title: Forbidden
            status: 403
            code: authorization_error
            stable_code: WEBHOOKERY_TENANT_ACCESS_DENIED
            request_id: req_example
            retryable: false
    ValidationProblem:
      description: The request is malformed or violates validation rules.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: about:blank
            title: Bad request
            status: 400
            code: validation_error
            stable_code: WEBHOOKERY_VALIDATION_FAILED
            detail: Invalid JSON body.
            request_id: req_example
            retryable: false
    UnauthorizedProblem:
      description: Authentication is missing, invalid, or expired.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: about:blank
            title: Unauthorized
            status: 401
            code: authentication_error
            stable_code: WEBHOOKERY_AUTHENTICATION_REQUIRED
            request_id: req_example
            retryable: false
    ForbiddenProblem:
      description: The authenticated actor lacks the required role, scope, tenant membership, or raw-payload permission.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: about:blank
            title: Forbidden
            status: 403
            code: authorization_error
            stable_code: WEBHOOKERY_TENANT_ACCESS_DENIED
            request_id: req_example
            retryable: false
    NotFoundProblem:
      description: The resource does not exist or is not visible to the actor.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: about:blank
            title: Not found
            status: 404
            code: not_found
            stable_code: WEBHOOKERY_RESOURCE_NOT_FOUND
            request_id: req_example
            retryable: false
    PayloadTooLargeProblem:
      description: The request body exceeds the configured capture limit.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: about:blank
            title: Payload too large
            status: 413
            code: payload_too_large
            stable_code: WEBHOOKERY_PAYLOAD_TOO_LARGE
            request_id: req_example
            retryable: false
    HeadersTooLargeProblem:
      description: Header count or header bytes exceed the configured ingress limits.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: about:blank
            title: Headers too large
            status: 431
            code: headers_too_large
            stable_code: WEBHOOKERY_HEADERS_TOO_LARGE
            request_id: req_example
            retryable: false
    StorageUnavailableProblem:
      description: Durable storage was unavailable before acknowledgement.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: about:blank
            title: Internal server error
            status: 503
            code: storage_unavailable
            stable_code: WEBHOOKERY_DURABLE_CAPTURE_UNAVAILABLE
            request_id: req_example
            retryable: true
  schemas:
    Problem:
      type: object
      required: [type, title, status, code, stable_code, request_id]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
          description: Legacy short problem code retained for compatibility.
        stable_code:
          type: string
          description: Namespaced stable code for SDK, CLI, support, and incident handling.
          examples:
            - WEBHOOKERY_PROVIDER_SIGNATURE_INVALID
        request_id:
          type: string
        retryable:
          type: boolean
    DeliverySignature:
      type: string
      description: Webhook-Signature header using HMAC-SHA256.
    ReasonRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
    CreateAPIKeyRequest:
      type: object
      required: [name, role, scopes]
      additionalProperties: false
      properties:
        name:
          type: string
        user_id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [owner, admin, developer, operator, security, auditor, support]
        scopes:
          type: array
          minItems: 1
