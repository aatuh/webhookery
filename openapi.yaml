components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  responses:
    Problem:
      description: Problem details error response.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    Problem:
      type: object
      required: [type, title, status, code, request_id]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
        request_id:
          type: string
        retryable:
          type: boolean
    DeliverySignature:
      type: string
      description: Webhook-Signature header using HMAC-SHA256.
    ReasonRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
    CreateAPIKeyRequest:
      type: object
      required: [name, role, scopes]
      additionalProperties: false
      properties:
        name:
          type: string
        user_id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [owner, admin, developer, operator, security, auditor, support]
        scopes:
          type: array
          minItems: 1
          items:
            type: string
    APIKeyCreated:
      type: object
      required: [key, token]
      properties:
        key:
          $ref: "#/components/schemas/APIKey"
        token:
          type: string
          description: One-time API key token. It is not retrievable later.
    APIKey:
      type: object
      required: [id, tenant_id, user_id, name, prefix, last4, scopes, state, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        user_id:
          type: string
        name:
          type: string
        prefix:
          type: string
        last4:
          type: string
        scopes:
          type: array
          items:
            type: string
        state:
          type: string
          enum: [active, revoked]
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    APIKeyPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/APIKey"
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    Source:
      type: object
      required: [id, tenant_id, name, provider, adapter, state]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        provider:
          type: string
        adapter:
          type: string
        state:
          type: string
          enum: [active, disabled]
    SourcePage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    CreateSourceRequest:
      type: object
      required: [name, provider]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        provider:
          type: string
          minLength: 1
        adapter:
          type: string
        verification_secret:
          type: string
          description: Required except for internal trusted producer sources. Never returned.
    UpdateSourceRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        state:
          type: string
          enum: [active, disabled]
        reason:
          type: string
          minLength: 1
    RotateSourceSecretRequest:
      type: object
      required: [new_secret, reason]
      additionalProperties: false
      properties:
        new_secret:
          type: string
          minLength: 1
        grace_period_hours:
          type: integer
          minimum: 0
          maximum: 720
          default: 72
        reason:
          type: string
          minLength: 1
    RotateEndpointSecretRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        grace_period_hours:
          type: integer
          minimum: 0
          maximum: 720
          default: 72
        reason:
          type: string
          minLength: 1
    CreateEndpointRequest:
      type: object
      required: [url]
      additionalProperties: false
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        retry_policy_id:
          type: string
        mtls_client_cert_pem:
          type: string
          description: PEM client certificate. Required with mtls_client_key_pem and never returned by the API.
        mtls_client_key_pem:
          type: string
          description: PEM client private key. Required with mtls_client_cert_pem, encrypted at rest, and never returned by the API.
    UpdateEndpointRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        url:
          type: string
          format: uri
        state:
          type: string
          enum: [active, disabled]
        retry_policy_id:
          type: string
          description: Optional retry policy reference. Use an empty string to clear an existing policy.
        reason:
          type: string
          minLength: 1
    Endpoint:
      type: object
      required: [id, tenant_id, name, url, state, mtls_enabled, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        state:
          type: string
        retry_policy_id:
          type: string
        mtls_enabled:
          type: boolean
        mtls_cert_subject:
          type: string
          description: Subject metadata from the configured client certificate. Private key material is never returned.
        created_at:
          type: string
          format: date-time
    EndpointPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Endpoint"
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    SourceSecretVersion:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        source_id:
          type: string
        version:
          type: integer
        state:
          type: string
          enum: [active, previous, revoked]
        active_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    EndpointSecretVersion:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        endpoint_id:
          type: string
        version:
          type: integer
        algorithm:
          type: string
          enum: [hmac_sha256]
        state:
          type: string
          enum: [active, previous, revoked]
        active_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    CreateSubscriptionRequest:
      type: object
      required: [endpoint_id, event_types]
      additionalProperties: false
      properties:
        endpoint_id:
          type: string
        event_types:
          type: array
          items:
            type: string
        payload_format:
          type: string
          default: canonical_json
        transformation_id:
          type: string
          description: Optional active transformation to snapshot onto new delivery payloads.
    UpdateSubscriptionRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        endpoint_id:
          type: string
        event_types:
          type: array
          items:
            type: string
          minItems: 1
        payload_format:
          type: string
        transformation_id:
          type: string
          description: Optional active transformation. Use an empty string to clear an existing transformation.
        state:
          type: string
          enum: [active, disabled]
        reason:
          type: string
          minLength: 1
    Subscription:
      type: object
      required: [id, tenant_id, endpoint_id, event_types, payload_format, state, version, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        endpoint_id:
          type: string
        event_types:
          type: array
          items:
            type: string
        payload_format:
          type: string
        transformation_id:
          type: string
        transformation_version_id:
          type: string
        state:
          type: string
          enum: [active, disabled]
        version:
          type: integer
        active_version_id:
          type: string
        created_at:
          type: string
          format: date-time
    SubscriptionPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    CreateRouteRequest:
      type: object
      required: [source_id, name, endpoint_id]
      additionalProperties: false
      properties:
        source_id:
          type: string
        name:
          type: string
        priority:
          type: integer
          default: 100
        event_types:
          type: array
          items:
            type: string
        endpoint_id:
          type: string
        retry_policy_id:
          type: string
        transformation_id:
          type: string
          description: Optional active transformation to snapshot onto new delivery payloads.
        state:
          type: string
          enum: [draft, active, inactive]
          default: draft
    UpdateRouteRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        source_id:
          type: string
        name:
          type: string
          minLength: 1
        priority:
          type: integer
          minimum: 0
        event_types:
          type: array
          items:
            type: string
          minItems: 1
        endpoint_id:
          type: string
        retry_policy_id:
          type: string
          description: Optional retry policy reference. Use an empty string to clear an existing policy.
        transformation_id:
          type: string
          description: Optional active transformation. Use an empty string to clear an existing transformation.
        state:
          type: string
          enum: [draft, active, inactive]
        reason:
          type: string
          minLength: 1
