apiVersion: v1
kind: Secret
metadata:
  name: webhookery-secrets
  namespace: webhookery
  labels:
    app.kubernetes.io/name: webhookery
type: Opaque
stringData:
  WEBHOOKERY_DATABASE_URL: "postgres://webhookery:replace-me@postgres.example.internal:5432/webhookery?sslmode=require"
  WEBHOOKERY_MASTER_KEY_BASE64: "replace-with-32-byte-base64-key"
  WEBHOOKERY_BOOTSTRAP_TENANT_ID: "ten_prod"
  WEBHOOKERY_BOOTSTRAP_API_KEY_HASH: "sha256:replace-with-bootstrap-key-hash"
  WEBHOOKERY_BOOTSTRAP_API_KEY_PREFIX: "replace"
  WEBHOOKERY_OBJECT_STORAGE_ENDPOINT: "s3.example.internal"
  WEBHOOKERY_OBJECT_STORAGE_BUCKET: "webhookery-raw"
  WEBHOOKERY_OBJECT_STORAGE_ACCESS_KEY: "replace"
  WEBHOOKERY_OBJECT_STORAGE_SECRET_KEY: "replace"
  WEBHOOKERY_OBJECT_STORAGE_REGION: "us-east-1"
