apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhookery-api
  namespace: webhookery
  labels:
    app.kubernetes.io/name: webhookery
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: webhookery
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookery
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: webhookery:latest
          imagePullPolicy: IfNotPresent
          args: ["api"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: webhookery-config
            - secretRef:
                name: webhookery-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: webhookery-api
  namespace: webhookery
  labels:
    app.kubernetes.io/name: webhookery
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: webhookery
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
