apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhookery-scheduler
  namespace: webhookery
  labels:
    app.kubernetes.io/name: webhookery
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webhookery
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookery
        app.kubernetes.io/component: scheduler
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scheduler
          image: webhookery:latest
          imagePullPolicy: IfNotPresent
          args: ["scheduler"]
          envFrom:
            - configMapRef:
                name: webhookery-config
            - secretRef:
                name: webhookery-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
