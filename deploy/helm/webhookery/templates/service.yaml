apiVersion: v1
kind: Service
metadata:
  name: {{ include "webhookery.fullname" . }}-api
  labels:
    {{- include "webhookery.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "webhookery.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
